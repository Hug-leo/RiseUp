<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" role="img" aria-label="Bản đồ 34 tỉnh thành Việt Nam (2025)">
  <title>Bản đồ 34 tỉnh thành Việt Nam (2025)</title>
